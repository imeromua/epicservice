services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-epicservice}
      POSTGRES_USER: ${DB_USER:-epicuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-epicuser} -d ${DB_NAME:-epicservice}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy

  webapp:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    command: uvicorn webapp.api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    command: python bot.py
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db_data:
