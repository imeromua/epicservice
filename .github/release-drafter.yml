name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels:
      - "feat"
      - "feature"
  - title: "🐛 Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "🧰 Maintenance"
    labels:
      - "chore"
      - "refactor"
  - title: "📝 Documentation"
    labels:
      - "docs"

change-template: "- $TITLE (#$NUMBER)"
change-title-escapes: "<*_&"

template: |
  ## Зміни
  $CHANGES
