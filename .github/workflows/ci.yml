name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: epicservice
          POSTGRES_USER: epicuser
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U epicuser -d epicservice"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run migrations
        env:
          BOT_TOKEN: "TEST:TOKEN"
          DB_HOST: "127.0.0.1"
          DB_PORT: "5432"
          DB_NAME: "epicservice"
          DB_USER: "epicuser"
          DB_PASSWORD: "password"
          REDIS_ENABLED: "false"
        run: alembic upgrade head

      - name: Run tests
        env:
          BOT_TOKEN: "TEST:TOKEN"
          DB_HOST: "127.0.0.1"
          DB_PORT: "5432"
          DB_NAME: "epicservice"
          DB_USER: "epicuser"
          DB_PASSWORD: "password"
          REDIS_ENABLED: "false"
        run: pytest
